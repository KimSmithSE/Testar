<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tryck inte här</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green-deep:   #0d2b1a;
      --green-mid:    #1a4d2e;
      --green-bright: #2d8c4e;
      --green-neon:   #4eff91;
      --cream:        #f0ede4;
      --danger:       #ff4545;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: var(--green-deep);
      background-image:
        radial-gradient(ellipse at 20% 30%, #1a4d2e88 0%, transparent 60%),
        radial-gradient(ellipse at 80% 70%, #2d8c4e44 0%, transparent 55%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%232d8c4e' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* Floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb-1 { width: 400px; height: 400px; background: var(--green-neon); top: -100px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 300px; height: 300px; background: var(--green-bright); bottom: -80px; right: -80px; animation-delay: -4s; }
    .orb-3 { width: 200px; height: 200px; background: var(--green-neon); top: 50%; left: 60%; animation-delay: -8s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    /* Card */
    .card {
      position: relative;
      background: linear-gradient(135deg, #ffffff0d, #ffffff05);
      border: 1px solid #4eff9122;
      border-radius: 24px;
      padding: 64px 72px;
      text-align: center;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 60px #0008, 0 0 0 1px #4eff9108;
      animation: fadeUp 0.9s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--green-neon);
      opacity: 0.7;
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      color: var(--cream);
      line-height: 1.1;
      margin-bottom: 48px;
      text-shadow: 0 2px 24px #0006;
    }

    h1 span {
      color: var(--green-neon);
    }

    /* The Button */
    .btn {
      position: relative;
      display: inline-block;
      padding: 18px 44px;
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      color: var(--green-deep);
      background: var(--green-neon);
      border: none;
      border-radius: 100px;
      cursor: pointer;
      letter-spacing: 0.02em;
      box-shadow:
        0 4px 24px #4eff9144,
        0 0 0 0 #4eff9100;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #ffffffaa, transparent 60%);
      border-radius: inherit;
      opacity: 0.3;
      pointer-events: none;
    }

    .btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow:
        0 8px 36px #4eff9166,
        0 0 0 6px #4eff9118;
    }

    .btn:active {
      transform: translateY(0) scale(0.98);
    }

    /* Warning tag below button */
    .warning {
      margin-top: 20px;
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--danger);
      opacity: 0.55;
    }

    /* Corner decoration */
    .corner {
      position: fixed;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--green-neon);
      opacity: 0.25;
      font-family: 'DM Mono', monospace;
      transition: color 1s ease;
    }
    .corner-tl { top: 24px; left: 28px; }
    .corner-br { bottom: 24px; right: 28px; }

    /* RED MODE */
    body.red-mode {
      background-color: #2b0d0d;
      background-image:
        radial-gradient(ellipse at 20% 30%, #4d1a1a88 0%, transparent 60%),
        radial-gradient(ellipse at 80% 70%, #8c2d2d44 0%, transparent 55%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%238c2d2d' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      transition: background-color 1.2s ease;
    }
    body.red-mode .orb-1 { background: #ff4545; }
    body.red-mode .orb-2 { background: #ff6a00; }
    body.red-mode .orb-3 { background: #ff4545; }
    body.red-mode .card  { border-color: #ff454522; box-shadow: 0 0 60px #0008, 0 0 0 1px #ff454508; }
    body.red-mode h1 span { color: #ff6a6a; }
    body.red-mode .eyebrow { color: #ff6a6a; }
    body.red-mode .corner  { color: #ff6a6a; }
    body.red-mode .btn {
      background: #ff4545;
      color: #fff;
      box-shadow: 0 4px 24px #ff454544;
    }
    body.red-mode .btn:hover {
      box-shadow: 0 8px 36px #ff454566, 0 0 0 6px #ff454518;
    }

    /* Explosion canvas */
    #explosion-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
    }

    /* Screen flash */
    #flash {
      position: fixed;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 998;
      transition: opacity 0.05s ease;
    }
    #flash.boom { opacity: 0.85; }

    /* Shake animation */
    @keyframes shake {
      0%   { transform: translate(0,0) rotate(0deg); }
      15%  { transform: translate(-8px, 6px) rotate(-2deg); }
      30%  { transform: translate(8px, -6px) rotate(2deg); }
      45%  { transform: translate(-6px, 4px) rotate(-1deg); }
      60%  { transform: translate(6px, -4px) rotate(1deg); }
      75%  { transform: translate(-3px, 2px) rotate(0deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
    body.shaking { animation: shake 0.5s ease; }
  </style>
</head>
<body>

  <canvas id="explosion-canvas"></canvas>
  <div id="flash"></div>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <span class="corner corner-tl">v1.0.0 — classified</span>
  <span class="corner corner-br">© ingen rättigheter förbehållna</span>

  <div class="card">
    <p class="eyebrow">⚠ varning ⚠</p>
    <h1>Välkommen till<br/><span>den gröna sidan</span></h1>
    <button class="btn" id="theBtn">Tryck inte här</button>
    <p class="warning">◆ seriöst. gör det inte. ◆</p>
  </div>

  <script>
    const btn = document.getElementById('theBtn');
    const canvas = document.getElementById('explosion-canvas');
    const ctx = canvas.getContext('2d');
    const flash = document.getElementById('flash');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    let particles = [];
    let animating = false;

    class Particle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = 4 + Math.random() * 14;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed - Math.random() * 6;
        this.life = 1;
        this.decay = 0.012 + Math.random() * 0.022;
        this.size = 4 + Math.random() * 18;
        this.shape = Math.random() < 0.5 ? 'circle' : 'spark';
        // colours: fire palette
        const palettes = [
          ['#ff4500','#ff6a00','#ffb300','#fff700'],
          ['#ff0000','#ff4545','#ff8800','#ffdd00'],
          ['#ff6a00','#ffb347','#fff700','#ffffff'],
        ];
        const p = palettes[Math.floor(Math.random() * palettes.length)];
        this.color = p[Math.floor(Math.random() * p.length)];
        this.gravity = 0.25 + Math.random() * 0.2;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.3;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += this.gravity;
        this.vx *= 0.97;
        this.life -= this.decay;
        this.rotation += this.rotSpeed;
        this.size *= 0.985;
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 12;
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        if (this.shape === 'circle') {
          ctx.beginPath();
          ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
          ctx.fill();
        } else {
          // spark / shard
          ctx.beginPath();
          ctx.moveTo(0, -this.size / 2);
          ctx.lineTo(this.size / 5, 0);
          ctx.lineTo(0, this.size / 2);
          ctx.lineTo(-this.size / 5, 0);
          ctx.closePath();
          ctx.fill();
        }
        ctx.restore();
      }
    }

    function spawnExplosion(cx, cy) {
      for (let i = 0; i < 220; i++) {
        particles.push(new Particle(cx, cy));
      }
      // shockwave rings
      for (let r = 0; r < 3; r++) {
        setTimeout(() => spawnRing(cx, cy, r), r * 80);
      }
    }

    function spawnRing(cx, cy, idx) {
      const count = 40;
      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2;
        const p = new Particle(cx, cy);
        const speed = 8 + idx * 4;
        p.vx = Math.cos(angle) * speed;
        p.vy = Math.sin(angle) * speed;
        p.gravity = 0;
        p.size = 6;
        p.decay = 0.04;
        p.color = ['#ffdd00','#ffffff','#ff8800'][idx % 3];
        particles.push(p);
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => { p.update(); p.draw(); });
      if (particles.length > 0 || animating) {
        requestAnimationFrame(animate);
      }
      if (particles.length === 0) animating = false;
    }

    btn.addEventListener('click', () => {
      if (btn.dataset.exploded) return;
      btn.dataset.exploded = '1';

      // Flash
      flash.classList.add('boom');
      setTimeout(() => flash.classList.remove('boom'), 120);

      // Shake
      document.body.classList.add('shaking');
      setTimeout(() => document.body.classList.remove('shaking'), 500);

      // Explosion from button center
      const r = btn.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      animating = true;
      spawnExplosion(cx, cy);
      animate();

      // Go red after short delay
      setTimeout(() => {
        document.body.classList.add('red-mode');
      }, 300);

      // Change button text
      setTimeout(() => {
        btn.textContent = 'Jag sa ju det';
      }, 600);
    });
  </script>
</body>
</html>
