<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Peppol Validator</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #f5f6f8;
      --surface:   #ffffff;
      --border:    #dde1e9;
      --text:      #1a1f2e;
      --subtle:    #6b7385;
      --accent:    #2255cc;
      --accent-lt: #eef2fc;
      --radius:    12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'IBM Plex Sans', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
      transition: background-color 1s ease;
    }

    .header {
      width: 100%;
      max-width: 640px;
      margin-bottom: 40px;
      animation: fadeUp 0.6s cubic-bezier(.22,1,.36,1) both;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      font-weight: 500;
      flex-shrink: 0;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 0.875rem;
      color: var(--subtle);
      margin-left: 48px;
    }

    .card {
      width: 100%;
      max-width: 640px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: 0 2px 12px #0000000a;
      animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) 0.1s both;
    }

    .card-title {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--subtle);
      margin-bottom: 14px;
    }

    .dropzone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      background: var(--bg);
    }

    .dropzone:hover, .dropzone.dragover {
      border-color: var(--accent);
      background: var(--accent-lt);
    }

    .dropzone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      width: 44px;
      height: 44px;
      margin: 0 auto 16px;
      background: var(--accent-lt);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .drop-icon svg {
      width: 22px; height: 22px;
      stroke: var(--accent); fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .drop-label {
      font-size: 0.95rem;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .drop-label span {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .drop-hint {
      font-size: 0.78rem;
      color: var(--subtle);
      font-family: 'IBM Plex Mono', monospace;
    }

    .file-chosen {
      display: none;
      align-items: center;
      gap: 12px;
      background: var(--accent-lt);
      border: 1px solid #c5d4f5;
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 16px;
    }

    .file-chosen.visible { display: flex; }

    .file-chosen-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .file-chosen-icon svg {
      width: 16px; height: 16px;
      stroke: white; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .file-name {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.82rem;
      color: var(--accent);
      font-weight: 500;
      word-break: break-all;
    }

    .file-size { font-size: 0.72rem; color: var(--subtle); margin-top: 2px; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 28px 0; }

    .options { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }

    .option-chip {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.82rem;
      color: var(--subtle);
      cursor: pointer;
      transition: all 0.15s;
      background: var(--surface);
      user-select: none;
    }

    .option-chip input { display: none; }

    .option-chip.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-lt);
    }

    .option-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid currentColor;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .option-chip.active .option-dot::after {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    .btn-validate {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 2px 8px #2255cc33;
    }

    .btn-validate:hover:not(:disabled) {
      background: #1a44b0;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px #2255cc44;
    }

    .btn-validate:disabled {
      background: #b0bbd4;
      box-shadow: none;
      cursor: not-allowed;
    }

    .info-footer {
      width: 100%;
      max-width: 640px;
      margin-top: 20px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) 0.2s both;
    }

    .info-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.75rem; color: var(--subtle);
    }

    .info-item svg {
      width: 14px; height: 14px;
      stroke: var(--subtle); fill: none;
      stroke-width: 2; stroke-linecap: round;
      flex-shrink: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* RED MODE */
    body.red-mode { background: #1a0505; }
    body.red-mode .card { background: #1f0808; border-color: #5c1a1a; box-shadow: 0 0 60px #ff000022; }
    body.red-mode h1 { color: #ffaaaa; }
    body.red-mode .subtitle { color: #a06060; }
    body.red-mode .btn-validate { background: #ff4545; box-shadow: 0 4px 24px #ff454544; }

    #explosion-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 999; }

    #flash {
      position: fixed; inset: 0;
      background: white; opacity: 0;
      pointer-events: none; z-index: 998;
      transition: opacity 0.05s ease;
    }
    #flash.boom { opacity: 0.9; }

    @keyframes shake {
      0%   { transform: translate(0,0) rotate(0deg); }
      15%  { transform: translate(-8px, 6px) rotate(-2deg); }
      30%  { transform: translate(8px,-6px) rotate(2deg); }
      45%  { transform: translate(-6px, 4px) rotate(-1deg); }
      60%  { transform: translate(6px,-4px) rotate(1deg); }
      75%  { transform: translate(-3px, 2px) rotate(0deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
    body.shaking { animation: shake 0.5s ease; }
  </style>
</head>
<body>

  <canvas id="explosion-canvas"></canvas>
  <div id="flash"></div>

  <div class="header">
    <div class="logo-row">
      <div class="logo-icon">PV</div>
      <h1>Peppol Validator</h1>
    </div>
    <p class="subtitle">Validera fakturor och beställningar mot Peppol BIS-standarder</p>
  </div>

  <div class="card">
    <p class="card-title">Ladda upp dokument</p>

    <div class="dropzone" id="dropzone">
      <input type="file" id="fileInput" accept=".xml,.ubl"/>
      <div class="drop-icon">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </div>
      <p class="drop-label"><span>Klicka för att bläddra</span> eller dra och släpp en fil här</p>
      <p class="drop-hint">XML / UBL — max 10 MB</p>
    </div>

    <div class="file-chosen" id="fileChosen">
      <div class="file-chosen-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <div>
        <div class="file-name" id="fileName">–</div>
        <div class="file-size" id="fileSize">–</div>
      </div>
    </div>

    <hr class="divider"/>

    <p class="card-title">Valideringstyp</p>
    <div class="options">
      <label class="option-chip active">
        <input type="radio" name="type" value="bis3" checked/>
        <span class="option-dot"></span>Peppol BIS 3.0
      </label>
      <label class="option-chip">
        <input type="radio" name="type" value="bis2"/>
        <span class="option-dot"></span>Peppol BIS 2.0
      </label>
      <label class="option-chip">
        <input type="radio" name="type" value="svefaktura"/>
        <span class="option-dot"></span>Svefaktura 2.0
      </label>
    </div>

    <button class="btn-validate" id="validateBtn" disabled>Validera</button>
  </div>

  <div class="info-footer">
    <div class="info-item">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Filer bearbetas lokalt
    </div>
    <div class="info-item">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Stöder EN 16931
    </div>
    <div class="info-item">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      Certifierad accesspunkt
    </div>
  </div>

  <script>
    const dropzone    = document.getElementById('dropzone');
    const fileInput   = document.getElementById('fileInput');
    const fileChosen  = document.getElementById('fileChosen');
    const fileName    = document.getElementById('fileName');
    const fileSize    = document.getElementById('fileSize');
    const validateBtn = document.getElementById('validateBtn');
    const canvas      = document.getElementById('explosion-canvas');
    const ctx         = canvas.getContext('2d');
    const flash       = document.getElementById('flash');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    function formatBytes(b) {
      if (b < 1024) return b + ' B';
      if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
      return (b/(1024*1024)).toFixed(1) + ' MB';
    }

    function handleFile(file) {
      if (!file) return;
      fileName.textContent = file.name;
      fileSize.textContent = formatBytes(file.size);
      fileChosen.classList.add('visible');
      validateBtn.disabled = false;
    }

    fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      handleFile(e.dataTransfer.files[0]);
    });

    document.querySelectorAll('.option-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.option-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
      });
    });

    // Explosion
    let particles = [], animating = false;

    class Particle {
      constructor(x, y) {
        this.x = x; this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = 4 + Math.random() * 14;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed - Math.random() * 6;
        this.life = 1;
        this.decay = 0.012 + Math.random() * 0.022;
        this.size = 4 + Math.random() * 18;
        this.shape = Math.random() < 0.5 ? 'circle' : 'spark';
        const pal = [['#ff4500','#ff6a00','#ffb300','#fff700'],['#ff0000','#ff4545','#ff8800','#ffdd00'],['#ff6a00','#ffb347','#fff700','#ffffff']];
        const p = pal[Math.floor(Math.random()*pal.length)];
        this.color = p[Math.floor(Math.random()*p.length)];
        this.gravity = 0.25 + Math.random() * 0.2;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.3;
      }
      update() {
        this.x += this.vx; this.y += this.vy;
        this.vy += this.gravity; this.vx *= 0.97;
        this.life -= this.decay; this.rotation += this.rotSpeed; this.size *= 0.985;
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color; ctx.shadowColor = this.color; ctx.shadowBlur = 12;
        ctx.translate(this.x, this.y); ctx.rotate(this.rotation);
        if (this.shape === 'circle') {
          ctx.beginPath(); ctx.arc(0,0,this.size/2,0,Math.PI*2); ctx.fill();
        } else {
          ctx.beginPath();
          ctx.moveTo(0,-this.size/2); ctx.lineTo(this.size/5,0);
          ctx.lineTo(0,this.size/2); ctx.lineTo(-this.size/5,0);
          ctx.closePath(); ctx.fill();
        }
        ctx.restore();
      }
    }

    function spawnRing(cx, cy, idx) {
      for (let i = 0; i < 40; i++) {
        const angle = (i/40)*Math.PI*2;
        const p = new Particle(cx, cy);
        p.vx = Math.cos(angle)*(8+idx*4); p.vy = Math.sin(angle)*(8+idx*4);
        p.gravity = 0; p.size = 6; p.decay = 0.04;
        p.color = ['#ffdd00','#ffffff','#ff8800'][idx%3];
        particles.push(p);
      }
    }

    function spawnExplosion(cx, cy) {
      for (let i = 0; i < 220; i++) particles.push(new Particle(cx, cy));
      for (let r = 0; r < 3; r++) setTimeout(() => spawnRing(cx, cy, r), r*80);
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => { p.update(); p.draw(); });
      if (particles.length > 0 || animating) requestAnimationFrame(animate);
      if (particles.length === 0) animating = false;
    }

    validateBtn.addEventListener('click', () => {
      if (validateBtn.dataset.exploded) return;
      validateBtn.dataset.exploded = '1';

      flash.classList.add('boom');
      setTimeout(() => flash.classList.remove('boom'), 120);

      document.body.classList.add('shaking');
      setTimeout(() => document.body.classList.remove('shaking'), 500);

      const r = validateBtn.getBoundingClientRect();
      animating = true;
      spawnExplosion(r.left + r.width/2, r.top + r.height/2);
      animate();

      setTimeout(() => document.body.classList.add('red-mode'), 300);
      setTimeout(() => {
        validateBtn.textContent = 'Lurad, jag kan inte ens programmera';
        validateBtn.disabled = false;
      }, 600);
    });
  </script>
</body>
</html>
